<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cantina</title>

    <style>

        body{
            font-family: Arial;
            background: #f4f4f4;
            padding: 30px;
        }

        h1{
            text-align: center;
        }

        .container{
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
        }

        .card{
            background: white;
            width: 250px;
            padding: 15px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px #ccc;
        }

        .card img{
            width: 100%;
            height: 180px;
            object-fit: cover;
            border-radius: 10px;
        }

        .preco{
            color: green;
            font-size: 22px;
            font-weight: bold;
        }

    </style>
</head>
<body>

    <h1>Cardápio da Cantina</h1>

    <div class="container">

        {% for produto in produtos %}

            <div class="card">

                {% if produto.imagem %}
                    <img src="{{ url_for('static', filename='img/' + produto.imagem) }}">
                {% else %}
                    <img src="https://via.placeholder.com/250x180">
                {% endif %}

                <h2>{{ produto.nome }}</h2>

                <p>{{ produto.descricao }}</p>

                <p class="preco">
                    R$ {{ produto.preco }}
                </p>

                <p>
                    Estoque:
                    {{ produto.quantidade_estoque }}
                </p>

            </div>

        {% endfor %}

    </div>

</body>
</html>
